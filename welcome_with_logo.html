<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three Mile Cross Bowling Club</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #289ccd;
  color: white;
  margin: 0;
}

.container {
  margin-top: 60px;
}

h1 {
  font-size: 36px;
  margin-bottom: 40px;
}

button {
  font-size: 22px;
  padding: 20px;
  margin: 20px;
  width: 320px;
  border-radius: 12px;
  border: none;
  background: #1f3f99;
  color: white;
}

button:hover {
  background: #efb23b;
  color: #1f3f99;
}
</style>

<script>
let timer;

function resetTimer(){
  clearTimeout(timer);
  timer = setTimeout(() => location.reload(), 180000);
}

function go(url){
  resetTimer();
  window.location.href = url;
}

document.onclick = resetTimer;
window.onload = resetTimer;
</script>

</head>

<body>

<div class="container">
  <h1>Welcome to Three Mile Cross Bowling Club</h1>

  <button onclick="go('https://www.tmxbowls.uk')">
    Visit Our Website
  </button>

  <br>

  <button onclick="go('https://www.ourbias.co.uk/Account/Login')">
    Online Booking System (BIAS)
  </button>
</div>

</body>
</html>
